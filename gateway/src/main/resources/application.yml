server:
  port: 8080

spring:
  application:
    name: gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "https://fin-pulse.online"
              - "https://www.fin-pulse.online"
            allowed-methods: [GET, POST, PATCH, PUT, DELETE, OPTIONS]
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

      routes:
        - id: auth
          uri: ${AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RL_AUTH_RPS:5}
                redis-rate-limiter.burstCapacity: ${RL_AUTH_BURST:10}
                key-resolver: "#{@ipKeyResolver}"

        - id: reports
          uri: ${REPORTS_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/reports/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RL_API_RPS:20}
                redis-rate-limiter.burstCapacity: ${RL_API_BURST:40}
                key-resolver: "#{@ipKeyResolver}"
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}

        - id: core
          uri: ${CORE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/families/**,/api/v1/categories/**,/api/v1/operations/**,/api/v1/limits/**,/api/v1/invitations/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RL_API_RPS:20}
                redis-rate-limiter.burstCapacity: ${RL_API_BURST:40}
                key-resolver: "#{@ipKeyResolver}"
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
