global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  - job_name: auth
    metrics_path: /api/v1/actuator/prometheus
    static_configs:
      - targets: ['auth:8081']
        labels: { service: auth }

  - job_name: core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['core:8082']
        labels: { service: core }

  - job_name: reports
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['reports:8083']
        labels: { service: reports }

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8080']
        labels: { service: gateway }

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
